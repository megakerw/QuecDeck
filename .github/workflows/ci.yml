name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Test suite
        run: bash tools/run-tests.sh --slow

      - name: Queue daemon integration test
        run: bash tools/host-test-atqueue.sh

      - name: auth.lua tests
        run: |
          sudo apt-get install -y -qq lua5.1
          sudo bash tools/host-test-authlua.sh

      - name: Repository integrity checks
        run: bash tools/ci-checks.sh
