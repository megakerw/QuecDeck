<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QuecDeck</title>
    <link rel="stylesheet" href="css/bootstrap.min.css?v=0798f593" />
    <link rel="stylesheet" href="css/styles.css?v=0798f593" />
    <link rel="icon" href="favicon.ico" />
    <script src="js/bootstrap.bundle.min.js?v=0798f593"></script>
    <script src="js/utils.js?v=0798f593"></script>
    <script src="js/alpinejs.min.js?v=0798f593" defer></script>

  </head>
  <body>
    <main>
      <div class="container my-4" x-data="cellScanner()">
        <div id="nav-placeholder"></div>
        <script src="js/nav.js?v=0798f593"></script>


        <div class="row gy-3 mt-4 mb-4 align-items-stretch">
          <div class="col-12">
            <div class="panel-section">
              <div class="panel-title">Cell Scanner</div>
              <div class="table-responsive">
                <table class="table">
                    <thead>
                      <tr>
                        <th scope="col">Network</th>
                        <th scope="col">Provider</th>
                        <th scope="col">Band</th>
                        <th scope="col">Frequency</th>
                        <th scope="col">PCI</th>
                        <th scope="col">RSRP</th>
                        <th scope="col">Signal</th>
                      </tr>
                    </thead>
                    <tbody id="cellScanTableBody">
                      <!-- CELL ROWS HERE -->
                    </tbody>
                </table>
              </div>
              <div class="mt-auto pt-3 d-flex align-items-start gap-3">
                <div class="w-auto">
                  <select
                    class="form-select"
                    id="cellSelect"
                    x-model="cellScanMode"
                  >
                    <option selected>Select Scan Mode</option>
                    <option value="Full Scan">Full Scan</option>
                    <option value="LTE Only">LTE Only</option>
                    <option value="NR5G Only">NR5G Only</option>
                  </select>
                </div>
                <div class="d-flex gap-2">
                  <button
                    class="btn btn-primary"
                    type="button"
                    @click="$store.confirmModal.open(`This will scan ${cellScanMode === 'LTE Only' ? 'LTE' : cellScanMode === 'NR5G Only' ? 'NR5G-SA' : 'all LTE and NR5G-SA'} cells in your area. Your internet connection may be interrupted and the scan can take a few minutes to complete.`, () => startCellScan(), `Start ${cellScanMode === 'LTE Only' ? 'LTE' : cellScanMode === 'NR5G Only' ? 'NR5G-SA' : 'Full'} Cell Scan?`)"
                    :disabled="isLoading === true || $store.scanBanner.active || cellScanMode === 'Unspecified' || cellScanMode === 'Select Scan Mode'"
                  >Start Cell Scan</button>
                  <button
                    class="btn btn-danger"
                    type="button"
                    x-on:click="clearTableRowsBodyCellScan()"
                    :disabled="isLoading === true || resultDoneCell === false"
                  >Clear</button>
                </div>
              </div>
            </div>
          </div>

          <div class="col-12">
            <div class="panel-section">
              <div class="panel-title">Neighbour Cell Scan</div>
              <div class="table-responsive">
                <table class="table">
                    <thead>
                      <tr>
                        <th scope="col">Network</th>
                        <th scope="col">Frequency</th>
                        <th scope="col">PCI</th>
                        <th scope="col">RSRP</th>
                        <th scope="col">Signal</th>
                      </tr>
                    </thead>
                    <tbody id="neighbourCellTableBody">
                      <!-- NEIGHBOUR CELL ROWS HERE -->
                    </tbody>
                </table>
              </div>
              <div class="mt-auto pt-3 d-flex align-items-start gap-3">
                <div class="w-auto">
                  <select
                    class="form-select"
                    id="neighbourCellSelect"
                    x-model="neighbourCellsScanMode"
                  >
                    <option selected>Select Scan Mode</option>
                    <option value="LTE and NR5G">LTE and NR5G</option>
                    <option value="LTE">LTE</option>
                    <option value="NR5G">NR5G</option>
                  </select>
                </div>
                <div class="d-flex gap-2">
                  <button
                    class="btn btn-primary"
                    type="button"
                    @click="$store.confirmModal.open(`This will scan neighbouring ${neighbourCellsScanMode === 'LTE' ? 'LTE' : neighbourCellsScanMode === 'NR5G' ? 'NR5G' : 'LTE and NR5G'} cells from your current network provider.`, () => getNeighbourcellLTEandNR5G(), `Start ${neighbourCellsScanMode === 'LTE' ? 'LTE' : neighbourCellsScanMode === 'NR5G' ? 'NR5G' : 'LTE and NR5G'} Neighbour Cell Scan?`)"
                    :disabled="isLoading === true || $store.scanBanner.active || neighbourCellsScanMode === 'Unspecified' || neighbourCellsScanMode === 'Select Scan Mode'"
                  >Start Neighbour Cell Scan</button>
                  <button
                    class="btn btn-danger"
                    type="button"
                    x-on:click="clearTableRowsBodyNeighbourCells()"
                    :disabled="isLoading === true || resultDoneNeighbourCell === false"
                  >Clear</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="js/dark-mode.js?v=0798f593"></script>
    <script src="js/scanner.js?v=0798f593"></script>
  </body>
</html>
