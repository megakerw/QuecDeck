<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QuecDeck</title>
  <link rel="stylesheet" href="css/bootstrap.min.css?v=3091d9b2" />
  <link rel="stylesheet" href="css/styles.css?v=3091d9b2" />
  <link rel="icon" href="favicon.ico" />
  <script src="js/bootstrap.bundle.min.js?v=3091d9b2"></script>
  <script src="js/utils.js?v=3091d9b2"></script>
  <script src="js/alpinejs.min.js?v=3091d9b2" defer></script>
</head>

<body>
  <main>
    <div class="container my-4" x-data="fetchSMS()">
      <div id="nav-placeholder"></div>
      <script src="js/nav.js?v=3091d9b2"></script>
      <div class="row gy-3 mt-4 mb-4 align-items-stretch">
        <div class="col">
          <div class="panel-section">
            <div class="panel-title d-flex align-items-center gap-2">
              SMS Inbox
              <span x-show="isLoading" class="spinner-border spinner-border-sm text-secondary" role="status" aria-label="Loading" x-cloak></span>
              <button class="btn btn-sm btn-primary ms-auto" type="button" @click="init()" :disabled="isLoading">Refresh</button>
            </div>
            <div class="sms-inbox-scroll">
                <table class="table table-hover">
                  <thead x-show="messages.length > 0" x-cloak>
                    <tr>
                      <th>
                        <div class="form-check mb-0">
                          <input id="selectAllCheckbox" class="form-check-input" type="checkbox" @change="toggleAll($event)" />
                          <label class="form-check-label" for="selectAllCheckbox">Select All</label>
                        </div>
                      </th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-if="messages.length === 0 && !isLoading">
                      <tr><td class="text-muted">Inbox is empty.</td></tr>
                    </template>
                    <template x-for="(message, index) in messages" :key="index">
                      <tr>
                        <td>
                          <div class="form-check">
                            <input class="form-check-input" type="checkbox" :value="index"
                              x-model="selectedMessages" />
                            <div class="row column-gap-1 mb-2">
                              <div class="col-md-3">
                                <p x-text="'Sender: ' + message.sender"></p>
                              </div>
                              <div class="col">
                                <p x-text="'Date and Time: ' + message.displayDate"></p>
                              </div>
                            </div>
                            <div class="col-md-9">
                              <p x-text="message.text"></p>
                            </div>
                          </div>
                        </td>
                      </tr>
                    </template>
                  </tbody>
                </table>
            </div>
            <div class="mt-auto pt-3 d-flex">
              <button class="btn btn-danger ms-auto" type="button" @click="deleteSelectedSMS()" :disabled="isLoading || selectedMessages.length === 0">Delete Selected</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="js/dark-mode.js?v=3091d9b2"></script>
  <script src="js/sms.js?v=3091d9b2"></script>
</body>
</html>
