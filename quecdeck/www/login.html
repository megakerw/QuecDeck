<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QuecDeck — Sign In</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css?v=28ffac85" />
    <link rel="stylesheet" href="/css/styles.css?v=28ffac85" />
    <link rel="icon" href="/favicon.ico" />
    <script src="/js/bootstrap.bundle.min.js?v=28ffac85"></script>
    <script src="/js/dark-mode.js?v=28ffac85" defer></script>
    <script src="/js/alpinejs.min.js?v=28ffac85" defer></script>
  </head>
  <body>
    <main>
      <div class="container my-4" x-data="loginPage()">
        <nav class="navbar navbar-expand-lg">
          <div class="container-fluid px-3">
            <span class="navbar-brand align-self-center">QuecDeck</span>
            <span class="navbar-text ms-auto d-flex align-items-center">
              <button class="btn btn-link text-reset" id="darkModeToggle"></button>
            </span>
          </div>
        </nav>

        <div class="row gy-3 justify-content-center">
          <div class="col-sm-8 col-md-5 col-lg-4">
            <div class="panel-section">
              <h5 class="mb-3">Sign In</h5>

                <div x-show="expired" class="alert alert-warning" role="alert">
                  Your session expired due to inactivity. Please sign in again.
                </div>
                <div x-show="locked" class="alert alert-danger" role="alert">
                  Too many failed attempts. Try again in 15 minutes.
                </div>
                <div x-show="error" class="alert alert-danger" role="alert">
                  Invalid username or password.
                </div>

                <form @submit.prevent="submitLogin($event)">
                  <div class="mb-0">
                    <label for="password" class="form-label">Password</label>
                    <input
                      type="password"
                      class="form-control"
                      id="password"
                      name="password"
                      autocomplete="current-password"
                      autofocus
                      required
                    />
                  </div>
                  <button type="submit" class="btn btn-primary w-100" style="margin-top: 2rem;" :disabled="submitting">
                    <span x-show="!submitting">Sign In</span>
                    <span x-show="submitting">Signing in...</span>
                  </button>
                </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="/js/login.js?v=28ffac85"></script>
  </body>
</html>
