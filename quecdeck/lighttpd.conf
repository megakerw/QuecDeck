server.modules = (
    "mod_openssl",
    "mod_magnet",
    "mod_redirect",
    "mod_cgi",
    "mod_proxy",
    "mod_setenv",
)

server.username = "www-data"
server.groupname = "dialout"
server.max-connections = 16
server.max-fds = 64
server.max-keep-alive-requests = 256
server.max-keep-alive-idle = 45

# Reject (400) encoded slashes and dot-segments in the request path instead
# of the default silent decode/collapse, so a crafted traversal fails loud
# before it can reach auth.lua's raw-URI checks. No legitimate URL here has
# %2f or dot-segments in the path (query strings are unaffected). lighttpd's
# other normalization defaults (url-normalize, unreserved, ctrls-reject,
# utf8-reject) stay on; only these two pairs are flipped. Each pair needs
# exactly one side enabled or lighttpd -tt errors on the conflict.
server.http-parseopts = (
    "url-path-2f-decode"     => "disable",
    "url-path-2f-reject"     => "enable",
    "url-path-dotseg-remove" => "disable",
    "url-path-dotseg-reject" => "enable",
)

server.tag = ""
server.bind = "0.0.0.0"
server.port = 80
server.use-ipv6 = "disable"
server.document-root = "/usrdata/quecdeck/www"
index-file.names = ( "index.html" )

# Prevent browser caching of authenticated HTML pages. Must include "/"
# (index.html served as directory index): without an explicit header there,
# browsers heuristically cache the home page, and a stale index.html requests
# assets by outdated ?v= URLs, pairing old markup with new scripts.
$HTTP["url"] =~ "(^/$|\.html$)" {
    setenv.add-response-header += ("Cache-Control" => "no-store")
}

# Static assets: cached for a year. Safe because every js/css reference in
# HTML carries a content-hashed ?v= (maintained by the pre-commit hook) and
# the HTML itself is always no-store, so a content change is a new URL.
# Fonts and favicon never change once deployed.
$HTTP["url"] =~ "\.(js|css)$" {
    setenv.add-response-header += ("Cache-Control" => "max-age=31536000, immutable")
}
$HTTP["url"] =~ "^(/fonts/|/favicon\.ico)" {
    setenv.add-response-header += ("Cache-Control" => "max-age=31536000, immutable")
}

# Security headers applied to all responses
setenv.add-response-header += (
    "X-Frame-Options" => "DENY",
    "X-Content-Type-Options" => "nosniff",
    "Referrer-Policy" => "no-referrer",
    "Permissions-Policy" => "camera=(), microphone=(), geolocation=(), payment=()",
    "Cross-Origin-Opener-Policy" => "same-origin",
    "Cross-Origin-Resource-Policy" => "same-origin",
)

# CSP applied to all responses except the ttyd console proxy, which serves its
# own bundled assets that may use inline scripts/styles incompatible with a
# strict policy. The console is already protected by auth.lua.
$HTTP["url"] !~ "^/console" {
    setenv.add-response-header += (
        "Content-Security-Policy" => "default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self'; img-src 'self' data:",
    )
}

$SERVER["socket"] == "0.0.0.0:443" {
    ssl.engine = "enable"
    ssl.privkey = "/usrdata/quecdeck/server.key"
    ssl.pemfile = "/usrdata/quecdeck/server.crt"
    ssl.openssl.ssl-conf-cmd = ("MinProtocol" => "TLSv1.3")

    # HSTS: tell browsers to always use HTTPS
    setenv.add-response-header += ("Strict-Transport-Security" => "max-age=31536000")

    # Session-based authentication, runs before every request
    magnet.attract-raw-url-to = ( "/usrdata/quecdeck/auth.lua" )

    # CGI only reachable via authenticated HTTPS
    $HTTP["url"] =~ "^/cgi-bin/" {
        cgi.assign = ( "" => "" )
    }

    # Console proxy (developer access is enforced by auth.lua)
    $HTTP["url"] =~ "^/console" {
        proxy.header = ("map-urlpath" => ( "/console" => "/" ), "upgrade" => "enable")
        proxy.server = ( "" => ("" => ( "host" => "127.0.0.1", "port" => 8080 )))
    }
}

# HTTP serves no content: auth.lua and cgi.assign are bound to the 443 socket only,
# so a request that fell through here would hit the document root unauthenticated.
# Both branches terminate the request.
$HTTP["scheme"] == "http" {
    # IP host: redirect to HTTPS. Host is an IP, so ${url.authority} can't be a
    # crafted hostname.
    $HTTP["host"] =~ "^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}(:[0-9]+)?$" {
        url.redirect = ("" => "https://${url.authority}${url.path}${qsa}")
    }
    # Any other Host: reject. Fixed target, not ${url.authority}, so a crafted Host
    # can't become an open redirect.
    $HTTP["host"] !~ "^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}(:[0-9]+)?$" {
        url.redirect-code = 403
        url.redirect = ("" => "/")
    }
}
