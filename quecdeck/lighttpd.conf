server.modules = (
    "mod_openssl",
    "mod_magnet",
    "mod_redirect",
    "mod_cgi",
    "mod_proxy",
    "mod_setenv",
)

server.username = "www-data"
server.groupname = "dialout"
server.max-connections = 16
server.max-fds = 64
server.max-keep-alive-requests = 16
server.max-keep-alive-idle = 15

server.tag = ""
server.bind = "0.0.0.0"
server.port = 80
server.use-ipv6 = "disable"
server.document-root = "/usrdata/quecdeck/www"
index-file.names = ( "index.html" )

# Prevent browser caching of authenticated HTML pages
$HTTP["url"] =~ "\.html$" {
    setenv.add-response-header += ("Cache-Control" => "no-store")
}

# Static assets: short max-age with must-revalidate so browsers check for
# updates via ETag/Last-Modified instead of serving stale files indefinitely.
# Fonts and favicon are cached for a year since they never change once deployed.
$HTTP["url"] =~ "\.(js|css)$" {
    setenv.add-response-header += ("Cache-Control" => "max-age=3600, must-revalidate")
}
$HTTP["url"] =~ "^(/fonts/|/favicon\.ico)" {
    setenv.add-response-header += ("Cache-Control" => "max-age=31536000, immutable")
}

# Security headers applied to all responses
setenv.add-response-header += (
    "X-Frame-Options" => "DENY",
    "X-Content-Type-Options" => "nosniff",
    "Referrer-Policy" => "no-referrer",
    "Permissions-Policy" => "camera=(), microphone=(), geolocation=(), payment=()",
    "Cross-Origin-Opener-Policy" => "same-origin",
    "Cross-Origin-Resource-Policy" => "same-origin",
)

# CSP applied to all responses except the ttyd console proxy, which serves its
# own bundled assets that may use inline scripts/styles incompatible with a
# strict policy. The console is already protected by auth.lua.
$HTTP["url"] !~ "^/console" {
    setenv.add-response-header += (
        "Content-Security-Policy" => "default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self'; img-src 'self' data:",
    )
}

$SERVER["socket"] == "0.0.0.0:443" {
    ssl.engine = "enable"
    ssl.privkey = "/usrdata/quecdeck/server.key"
    ssl.pemfile = "/usrdata/quecdeck/server.crt"
    ssl.openssl.ssl-conf-cmd = ("MinProtocol" => "TLSv1.3")

    # HSTS — tell browsers to always use HTTPS
    setenv.add-response-header += ("Strict-Transport-Security" => "max-age=31536000")

    # Session-based authentication — runs before every request
    magnet.attract-raw-url-to = ( "/usrdata/quecdeck/auth.lua" )

    # CGI only reachable via authenticated HTTPS
    $HTTP["url"] =~ "/cgi-bin/" {
        cgi.assign = ( "" => "" )
    }

    # Console proxy — developer access is enforced by auth.lua
    $HTTP["url"] =~ "(^/console)" {
        proxy.header = ("map-urlpath" => ( "/console" => "/" ), "upgrade" => "enable")
        proxy.server = ( "" => ("" => ( "host" => "127.0.0.1", "port" => 8080 )))
    }
}

# HTTP: redirect to HTTPS only — no content served.
# Restrict to IP address Host headers only (the device is always accessed by IP,
# never by hostname), so a crafted Host: evil.com cannot produce an open redirect.
# Requests with any other Host format are dropped (no rule matches → 400).
$HTTP["scheme"] == "http" {
    $HTTP["host"] =~ "^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}(:[0-9]+)?$" {
        url.redirect = ("" => "https://${url.authority}${url.path}${qsa}")
    }
}
